        function addLog(message, type = 'info') {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
        }

        async function uploadPairingData(pairId, genderData) {
            try {
                addLog(`Uploading ${pairId}...`, 'info');

                const docRef = doc(db, 'zodiac-compatibility', pairId);
                const docSnap = await getDoc(docRef);

                if (!docSnap.exists()) {
                    addLog(`Document ${pairId} does not exist!`, 'error');
                    return false;
                }

                const existingData = docSnap.data();

                await setDoc(docRef, {
                    ...existingData,
                    genderSpecificMatching: genderData,
                    metadata: {
                        ...existingData.metadata,
                        updatedAt: new Date().toISOString(),
                        version: 2.0,
                        hasGenderSpecificData: true,
                        dataQuality: 'high-quality-sample'
                    }
                });

                addLog(`✅ Successfully uploaded ${pairId}`, 'success');
                return true;

            } catch (error) {
                addLog(`❌ Error uploading ${pairId}: ${error.message}`, 'error');
                return false;
            }
        }

        window.uploadSampleData = async function () {
            const btn = document.getElementById('uploadBtn');

            btn.textContent = 'Uploading...';

            addLog('Starting upload process...', 'info');
            showStatus('Uploading data...', 'info');

            try {
                // Upload Rat-Rat
                await uploadPairingData('Rat-Rat', SAMPLE_DATA['Rat-Rat']);
                await new Promise(resolve => setTimeout(resolve, 500));

                // Upload Rabbit-Snake
                await uploadPairingData('Rabbit-Snake', SAMPLE_DATA['Rabbit-Snake']);

                addLog('Upload complete!', 'success');
                showStatus('✅ All data uploaded successfully!', 'success');

                showStatus('❌ Upload failed!', 'error');
            } finally {

                btn.textContent = 'Upload Rat-Rat & Rabbit-Snake Data';
