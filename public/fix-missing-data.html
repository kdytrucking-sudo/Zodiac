<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix Missing Data - Zodiac Compatibility</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fdd56a 0%, #ffb84d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #aaa;
            font-size: 1.1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(253, 213, 106, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #fdd56a;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #aaa;
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #fdd56a 0%, #ffb84d 100%);
            color: #1a1a2e;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(253, 213, 106, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(253, 213, 106, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #fdd56a 0%, #ffb84d 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #1a1a2e;
        }

        .progress-text {
            text-align: center;
            color: #aaa;
        }

        .log-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(253, 213, 106, 0.2);
            border-radius: 12px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .log-entry {
            padding: 8px 12px;
            margin-bottom: 5px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .log-info {
            background: rgba(59, 130, 246, 0.1);
            border-left: 3px solid #3b82f6;
        }

        .log-success {
            background: rgba(34, 197, 94, 0.1);
            border-left: 3px solid #22c55e;
        }

        .log-warning {
            background: rgba(251, 191, 36, 0.1);
            border-left: 3px solid #fbbf24;
        }

        .log-error {
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid #ef4444;
        }

        .timestamp {
            color: #888;
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-wrench"></i> Fix Missing Data</h1>
            <p>Scan and repair missing detailedAnalysis fields in gender-specific data</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalPairings">144</div>
                <div class="stat-label">Total Pairings</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="scannedCount">0</div>
                <div class="stat-label">Scanned</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="fixedCount">0</div>
                <div class="stat-label">Fixed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="errorCount">0</div>
                <div class="stat-label">Errors</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn" onclick="startFixing()">
                <i class="fas fa-play"></i> Start Fixing
            </button>
            <button class="btn btn-secondary" id="scanBtn" onclick="scanOnly()">
                <i class="fas fa-search"></i> Scan Only (No Fix)
            </button>
            <button class="btn btn-secondary" onclick="clearLog()">
                <i class="fas fa-trash"></i> Clear Log
            </button>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
            </div>
            <div class="progress-text" id="progressText">Ready to start</div>
        </div>

        <div class="log-container" id="logContainer">
            <div class="log-entry log-info">
                <span class="timestamp">[Ready]</span>
                Click "Start Fixing" to scan and repair missing data, or "Scan Only" to check without making changes.
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './app.js';
        import { doc, getDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js';

        const zodiacSigns = ['Rat', 'Ox', 'Tiger', 'Rabbit', 'Dragon', 'Snake', 'Horse', 'Goat', 'Monkey', 'Rooster', 'Dog', 'Pig'];
        const genderCombinations = ['male-male', 'male-female', 'female-female', 'male-others', 'female-others', 'others-others'];
        const matchTypes = ['romance', 'business'];

        let stats = {
            scanned: 0,
            fixed: 0,
            errors: 0
        };

        function updateStats() {
            document.getElementById('scannedCount').textContent = stats.scanned;
            document.getElementById('fixedCount').textContent = stats.fixed;
            document.getElementById('errorCount').textContent = stats.errors;
        }

        function updateProgress(current, total) {
            const percentage = Math.round((current / total) * 100);
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressFill').textContent = percentage + '%';
            document.getElementById('progressText').textContent = `Processing ${current} of ${total} pairings...`;
        }

        function log(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;

            const timestamp = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="timestamp">[${timestamp}]</span>${message}`;

            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        window.clearLog = function () {
            document.getElementById('logContainer').innerHTML = '';
        };

        function generateSampleDetailedAnalysis(zodiac1, zodiac2, genderKey, matchType) {
            const genderDesc = genderKey.replace('-', ' and ');
            const typeDesc = matchType === 'romance' ? 'romantic relationship' : 'business partnership';

            return `The ${zodiac1} and ${zodiac2} pairing in a ${typeDesc} (${genderDesc}) creates a unique dynamic. ` +
                `The ${zodiac1}'s characteristics complement the ${zodiac2}'s approach, leading to a balanced interaction. ` +
                `This combination shows promise in ${matchType} contexts, with both parties bringing valuable perspectives to the relationship.`;
        }

        async function fixPairing(zodiac1, zodiac2, dryRun = false) {
            const pairId = `${zodiac1}-${zodiac2}`;

            try {
                const docRef = doc(db, 'zodiac-compatibility', pairId);
                const docSnap = await getDoc(docRef);

                if (!docSnap.exists()) {
                    log(`⚠️ ${pairId} - Document not found`, 'warning');
                    return { success: false, reason: 'not-found' };
                }

                const data = docSnap.data();
                let needsUpdate = false;
                const updates = {};

                // Check each gender combination
                for (const genderKey of genderCombinations) {
                    const genderData = data.genderSpecificMatching?.[genderKey];

                    if (!genderData) continue;

                    for (const matchType of matchTypes) {
                        const matchData = genderData[matchType];

                        if (matchData && !matchData.detailedAnalysis) {
                            needsUpdate = true;
                            const sampleAnalysis = generateSampleDetailedAnalysis(zodiac1, zodiac2, genderKey, matchType);

                            if (!updates[`genderSpecificMatching.${genderKey}.${matchType}`]) {
                                updates[`genderSpecificMatching.${genderKey}.${matchType}.detailedAnalysis`] = sampleAnalysis;
                            }

                            log(`🔧 ${pairId} - Missing detailedAnalysis in ${genderKey}/${matchType}`, 'warning');
                        }
                    }
                }

                if (needsUpdate) {
                    if (!dryRun) {
                        await updateDoc(docRef, updates);
                        log(`✅ ${pairId} - Fixed missing fields`, 'success');
                        stats.fixed++;
                    } else {
                        log(`📋 ${pairId} - Would fix ${Object.keys(updates).length} fields (dry run)`, 'info');
                    }
                } else {
                    log(`✓ ${pairId} - All fields present`, 'info');
                }

                stats.scanned++;
                return { success: true };

            } catch (error) {
                log(`❌ ${pairId} - Error: ${error.message}`, 'error');
                stats.errors++;
                return { success: false, error: error.message };
            }
        }

        async function processAll(dryRun = false) {
            const startBtn = document.getElementById('startBtn');
            const scanBtn = document.getElementById('scanBtn');

            startBtn.disabled = true;
            scanBtn.disabled = true;

            stats = { scanned: 0, fixed: 0, errors: 0 };
            updateStats();

            log(`🚀 Starting ${dryRun ? 'scan' : 'fix'} process...`, 'info');

            const totalPairings = zodiacSigns.length * zodiacSigns.length;
            let processed = 0;

            for (let i = 0; i < zodiacSigns.length; i++) {
                for (let j = 0; j < zodiacSigns.length; j++) {
                    const zodiac1 = zodiacSigns[i];
                    const zodiac2 = zodiacSigns[j];

                    await fixPairing(zodiac1, zodiac2, dryRun);

                    processed++;
                    updateProgress(processed, totalPairings);
                    updateStats();

                    // Small delay to prevent overwhelming Firestore
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
            }

            log(`🎉 ${dryRun ? 'Scan' : 'Fix'} complete! Scanned: ${stats.scanned}, Fixed: ${stats.fixed}, Errors: ${stats.errors}`, 'success');

            startBtn.disabled = false;
            scanBtn.disabled = false;
        }

        window.startFixing = function () {
            if (confirm('This will add missing detailedAnalysis fields to all gender-specific data. Continue?')) {
                processAll(false);
            }
        };

        window.scanOnly = function () {
            processAll(true);
        };

        // Make functions available globally
        window.db = db;
    </script>
</body>

</html>
